# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: AllMusic Client

on:
  push:
    # Sequence of patterns matched against refs/heads
    branches:
      - 'releases/**'
    # Sequence of patterns matched against refs/tags
    tags:
      - '*'

jobs:
  build_onejar_fabric_1_16_5:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'true'
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    - name: build
      shell: cmd
      run: |
        gradlew :client:buildClient
    - name: update
      uses: actions/upload-artifact@v4
      with:
        name: "allmusic_client"
        path: client/build/
    - name: Create Pre-release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, 'debug')
      uses: softprops/action-gh-release@v1
      with:
        prerelease: true
        tag_name: ${{ github.ref_name }}
        name: "Pre-release ${{ github.ref_name }}"
        body: "自动构建的预发布版本"
        files: |
          client/build/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
